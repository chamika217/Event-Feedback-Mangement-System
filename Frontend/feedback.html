<!DOCTYPE html>
<html>

<head>

<title>Submit Feedback</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Submit Feedback</h2>

<form id="feedbackForm">

<input class="form-control mb-3" id="name" placeholder="Your Name">

<input class="form-control mb-3" id="event" placeholder="Event Name">

<textarea class="form-control mb-3" id="feedback" placeholder="Your Feedback"></textarea>

<label>Rating</label>

<select class="form-control mb-3" id="rating">

<option>⭐</option>
<option>⭐⭐</option>
<option>⭐⭐⭐</option>
<option>⭐⭐⭐⭐</option>
<option>⭐⭐⭐⭐⭐</option>

</select>

<button class="btn btn-primary">Submit</button>

</form>

</div>

<script>

document.getElementById("feedbackForm").addEventListener("submit",async function(e){

e.preventDefault();

const data = {

name:document.getElementById("name").value,
event:document.getElementById("event").value,
feedback:document.getElementById("feedback").value,
rating:document.getElementById("rating").value

};

await fetch("http://localhost:3000/feedback",{

method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify(data)

});

alert("Feedback submitted successfully!");

});

</script>

</body>
</html>
