<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Submit Feedback</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.feedback-card{
max-width:500px;
margin:auto;
margin-top:80px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.error{
color:red;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<div class="card feedback-card p-4">

<h3 class="text-center mb-4">Submit Event Feedback</h3>

<form id="feedbackForm">

<div class="mb-3">
<input class="form-control" id="name" placeholder="Your Name">
<div class="error" id="nameError"></div>
</div>

<div class="mb-3">
<input class="form-control" id="event" placeholder="Event Name">
<div class="error" id="eventError"></div>
</div>

<div class="mb-3">
<textarea class="form-control" id="feedback" placeholder="Your Feedback"></textarea>
<div class="error" id="feedbackError"></div>
</div>

<div class="mb-3">

<label class="form-label">Rating</label>

<select class="form-control" id="rating">

<option value="">Select Rating</option>
<option value="⭐">⭐</option>
<option value="⭐⭐">⭐⭐</option>
<option value="⭐⭐⭐">⭐⭐⭐</option>
<option value="⭐⭐⭐⭐">⭐⭐⭐⭐</option>
<option value="⭐⭐⭐⭐⭐">⭐⭐⭐⭐⭐</option>

</select>

<div class="error" id="ratingError"></div>

</div>

<button class="btn btn-primary w-100">Submit Feedback</button>

</form>

<div id="successMessage" class="text-success mt-3 text-center"></div>

</div>

</div>

<script>

document.getElementById("feedbackForm").addEventListener("submit", async function(e){

e.preventDefault();

let valid=true;

const name=document.getElementById("name").value.trim();
const event=document.getElementById("event").value.trim();
const feedback=document.getElementById("feedback").value.trim();
const rating=document.getElementById("rating").value;

document.getElementById("nameError").innerText="";
document.getElementById("eventError").innerText="";
document.getElementById("feedbackError").innerText="";
document.getElementById("ratingError").innerText="";
document.getElementById("successMessage").innerText="";

if(name===""){
document.getElementById("nameError").innerText="Name is required";
valid=false;
}

if(event===""){
document.getElementById("eventError").innerText="Event name is required";
valid=false;
}

if(feedback===""){
document.getElementById("feedbackError").innerText="Feedback cannot be empty";
valid=false;
}

if(rating===""){
document.getElementById("ratingError").innerText="Please select a rating";
valid=false;
}

if(!valid){
return;
}

const data={name,event,feedback,rating};

await fetch("http://localhost:3000/feedback",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

document.getElementById("successMessage").innerText="Feedback submitted successfully!";

document.getElementById("feedbackForm").reset();

});

</script>

</body>
</html>
